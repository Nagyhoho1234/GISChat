name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore GISChat.sln

      # Esri's post-build targets use CodeTaskFactory which requires VS MSBuild,
      # unavailable on GitHub Actions. The DLL compiles fine before that step fails.
      - name: Build
        id: build
        continue-on-error: true
        run: dotnet build GISChat.sln -c Release -p:Platform=x64 --no-restore

      - name: Verify compilation
        run: |
          if (Test-Path "GISChat\bin\x64\Release\net8.0-windows10.0.19041.0\GISChat.dll") {
            $size = (Get-Item "GISChat\bin\x64\Release\net8.0-windows10.0.19041.0\GISChat.dll").Length
            Write-Host "Build successful: GISChat.dll ($size bytes)"
          } else {
            Write-Error "Compilation failed: GISChat.dll not found"
            exit 1
          }
