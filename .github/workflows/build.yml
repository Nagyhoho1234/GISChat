name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore GISChat.sln

      - name: Build
        # Esri's post-build targets use CodeTaskFactory which requires VS MSBuild.
        # The DLL compiles fine with dotnet CLI; we continue past the post-build error.
        run: |
          dotnet build GISChat.sln -c Release -p:Platform=x64 --no-restore 2>&1 | Tee-Object -Variable buildOutput
          # Check if the DLL was actually produced (compilation succeeds before post-build fails)
          if (Test-Path "GISChat\bin\x64\Release\net8.0-windows10.0.19041.0\GISChat.dll") {
            Write-Host "`nBuild successful: GISChat.dll produced"
          } else {
            Write-Error "Compilation failed: GISChat.dll not found"
            exit 1
          }
